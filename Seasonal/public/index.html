<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A mobile-first seasonal produce app that recommends fruits and vegetables based on the current month and part of the month."
    />
    <title>Seasonal Produce</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #fbf8ef;
      }

      .native-loading {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 28px;
        color: #20221f;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      .native-loading strong {
        display: block;
        margin-bottom: 8px;
        font-size: 1.25rem;
      }
    </style>
    <script>
      try {
        window.localStorage.setItem("__seasonal_probe", "1");
        window.localStorage.removeItem("__seasonal_probe");
      } catch {
        const memoryStorage = new Map();
        Object.defineProperty(window, "localStorage", {
          value: {
            getItem: key => memoryStorage.get(key) ?? null,
            setItem: (key, value) => memoryStorage.set(key, String(value)),
            removeItem: key => memoryStorage.delete(key),
            clear: () => memoryStorage.clear()
          }
        });
      }
    </script>
    <script defer src="./index-wMjnVS91.js"></script>
    <link rel="stylesheet" href="./index-CB4ulMcy.css">
  </head>
  <body>
    <div id="root">
      <div class="native-loading">
        <div>
          <strong>Seasonal Produce</strong>
          <span>Loading your market guide...</span>
        </div>
      </div>
    </div>
  </body>
</html>
